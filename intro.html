
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+Khmer:wght@300;400&family=Noto+Sans+Georgian:wght@300;400&family=Noto+Sans+Tifinagh&family=Noto+Sans:wght@300;400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .terminal {
    font-family: 'JetBrains Mono', monospace;
    padding: 2.5rem 2rem 2.5rem;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .line { display: flex; align-items: baseline; margin-bottom: 0.35rem; }
  .prompt { font-size: 12px; font-weight: 400; color: var(--color-text-tertiary); white-space: nowrap; user-select: none; }
  .prompt .sym { color: #ff1a1a; font-weight: 500; }

  .main-line { margin-top: 0.2rem; margin-bottom: 0; }

  .greeting {
    font-size: clamp(1.5rem, 4.5vw, 2.4rem);
    font-weight: 300;
    color: var(--color-text-primary);
    letter-spacing: -0.02em;
    white-space: nowrap;
    overflow: hidden;
  }

  .greeting .name { color: var(--color-text-primary); font-weight: 500; }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #ff1a1a;
    margin-left: 3px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .meta { margin-top: 1.4rem; display: flex; align-items: center; gap: 1rem; }

  .lang-code {
    font-size: 11px;
    font-weight: 400;
    color: #ff1a1a;
    letter-spacing: 0.08em;
    min-width: 40px;
    transition: opacity 0.2s;
  }

  .dots { display: flex; gap: 5px; }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--color-border-tertiary);
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  .dot:hover { transform: scale(1.3); }
  .dot.active { background: #ff1a1a; }

  .scanline {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent, transparent 3px, rgba(0,0,0,0.018) 3px, rgba(0,0,0,0.018) 4px);
    border-radius: 4px;
  }

  .comment { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 1rem; letter-spacing: 0.02em; }

  .font-khmer  { font-family: 'Noto Sans Khmer', sans-serif; font-size: 0.82em; }
  .font-geo    { font-family: 'Noto Sans Georgian', sans-serif; }
  .font-tfng   { font-family: 'Noto Sans Tifinagh', sans-serif; }
  .font-cyr    { font-family: 'Noto Sans', sans-serif; }
</style>

<div class="terminal">
  <div class="scanline"></div>
  <div class="comment">// greeting.sh</div>
  <div class="line">
    <span class="prompt"><span class="sym">❯</span> echo $GREETING</span>
  </div>
  <div class="line main-line">
    <div class="greeting">
      <span id="prefix"></span><span class="name"> Michelle</span><span class="cursor"></span>
    </div>
  </div>
  <div class="meta">
    <span class="lang-code" id="lang-code">en</span>
    <div class="dots" id="dots"></div>
  </div>
</div>

<script>
const greetings = [
  { code: "en",  prefix: "Hi, I'm",                cls: "" },
  { code: "de",  prefix: "Hallo, ich bin",          cls: "" },
  { code: "hr",  prefix: "Bok, ja sam",             cls: "" },
  { code: "fr",  prefix: "Bonjour, je suis",        cls: "" },
  { code: "gsw", prefix: "Hoi, ich bi",             cls: "" },
  { code: "km",  prefix: "សួស្តី ខ្ញុំឈ្មោះ",           cls: "font-khmer" },
  { code: "ka",  prefix: "გამარჯობა, მე ვარ",        cls: "font-geo" },
  { code: "zgh", prefix: "ⴰⵣⵓⵍ, ⵏⴽⴽ ⴷ",            cls: "font-tfng" },
  { code: "uk",  prefix: "Привіт, я",               cls: "font-cyr" },
  { code: "ja",  prefix: "やあ、私は",               cls: "" },
  { code: "ar",  prefix: "مرحباً، أنا",              cls: "" },
  { code: "pt",  prefix: "Olá, eu sou",             cls: "" },
  { code: "ko",  prefix: "안녕, 나는",               cls: "" },
  { code: "it",  prefix: "Ciao, sono",              cls: "" },
  { code: "es",  prefix: "Hola, soy",               cls: "" },
  { code: "sw",  prefix: "Habari, mimi ni",         cls: "" },
];

let current = 0;
let autoTimer;
let typingTimer;

const prefixEl = document.getElementById("prefix");
const codeEl   = document.getElementById("lang-code");
const dotsEl   = document.getElementById("dots");

function buildDots() {
  greetings.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === 0 ? " active" : "");
    d.onclick = () => { clearInterval(autoTimer); goTo(i); startAuto(); };
    dotsEl.appendChild(d);
  });
}

function updateDots(idx) {
  document.querySelectorAll(".dot").forEach((d, i) => d.classList.toggle("active", i === idx));
}

function typeText(text, el, cls) {
  clearTimeout(typingTimer);
  el.textContent = "";
  el.className = cls || "";
  const chars = [...text];
  let i = 0;
  function tick() {
    if (i < chars.length) {
      el.textContent += chars[i++];
      typingTimer = setTimeout(tick, 36 + Math.random() * 26);
    }
  }
  tick();
}

function goTo(idx) {
  current = idx;
  const g = greetings[idx];
  updateDots(idx);
  codeEl.style.opacity = "0";
  setTimeout(() => {
    codeEl.textContent = g.code;
    codeEl.style.opacity = "1";
  }, 150);
  typeText(g.prefix, prefixEl, g.cls);
}

function startAuto() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    goTo((current + 1) % greetings.length);
  }, 2800);
}

buildDots();
goTo(0);
startAuto();
</script>
